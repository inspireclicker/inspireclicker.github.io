<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意見回饋表單</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" integrity="sha256-PI8n5gCcz9cQqQXm3PEtDuPG8qx9oFsFctPg0S5zb8g=" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    
    <!-- Main Content -->
    <div class="container col-11 col-md-8 col-lg-6 mt-5">
        <!-- Introduction Card -->
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <h2 class="card-title text-center fw-bold">我們希望聽到您的聲音！</h2>
                <hr>
                <div class="text-center">您的意見對我們至關重要，誠摯邀請您填寫這份簡短的回饋表單。</div>
                <hr>
                <div class="text-center"><small><span class="text-danger">*</span> 表示必填問題</small></div>
            </div>
        </div>

        <!-- Feedback Form Card -->
        <div class="card shadow-sm">
            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label for="feedback" class="form-label">想對我們說 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="feedback" rows="4" placeholder="請與我們分享您的想法" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">類別 <span class="text-danger">*</span></label>
                        <select class="form-select" id="category" required>
                            <option value="" disabled selected>選擇一個類別</option>
                            <option value="service">申訴</option>
                            <option value="product">建議</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">您的姓名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" placeholder="請輸入您的姓名" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">聯絡電話 <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="phone" placeholder="請提供您的聯絡電話，便於我們聯繫您！" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-3">立即提交</button>
                </form>
                <p class="text-center mt-3">您的隱私對我們至關重要，我們承諾不會將您的個人信息用於任何不相關的用途。</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer text-center text-lg-start mt-5">
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.05); font-size: 0.875rem;">
            <p>本表單未經任何機構認可或隸屬於任何機構。</p>

            <a href="#" class="text-primary">舉報濫用</a> - 
            <a href="#" class="text-primary">服務條款</a> - 
            <a href="#" class="text-primary">隱私政策</a>
        </div>
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.05);">
            © 2024 意見回饋系統
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js" integrity="sha256-kIeAZ3TmSbIChOw7nHODWTRcfXYEEO2nTQ6kCYJ9RyI=" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</b
